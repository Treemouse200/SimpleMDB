<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>View Actor • Simple Movie Database</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles/main.css" />
    <script type="module" src="/scripts/actors/view.js" defer></script>
  </head>
  <body>
    <header>
      <h1>View Actor</h1>
      <nav>
        <ul>
          <li><a href="/" class="btn">Home</a></li>
          <li><a href="/actors/index.html" class="btn">All Actors</a></li>
          <li><a id="edit-link" class="btn">Edit</a></li>
        </ul>
      </nav>
    </header>
    <main class="container">
      <div id="status" class="status">Loading...</div>
      <table class="table">
        <tbody>
          <tr>
            <th>ID</th>
            <td id="actor-id">—</td>
          </tr>
          <tr>
            <th>Name</th>
            <td id="actor-name">—</td>
          </tr>
          <tr>
            <th>Birth Year</th>
            <td id="actor-birthYear">—</td>
          </tr>
          <tr>
            <th>Description</th>
            <td id="actor-desc">—</td>
          </tr>
        </tbody>
      </table>

      <section style="margin-top: 24px">
        <h2>Movies featuring this actor</h2>
        <div id="movies-status" class="status"></div>
        <ul id="actor-movies" class="list"></ul>
      </section>
    </main>
  </body>
</html>
